<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeCycle</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="popup-header">
    <div class="site-chip">
      <div class="favicon" id="favicon"></div>
      <div>
        <div class="eyebrow">Current site</div>
        <div class="domain" id="domain-name">No active tab</div>
      </div>
    </div>
    <button class="icon-btn" id="refresh-btn" type="button" title="Refresh" aria-label="Refresh">R</button>
  </header>

  <main>
    <section class="metric-grid" aria-label="Quick stats">
      <div class="metric-card">
        <span>Site today</span>
        <strong id="current-site-time">-</strong>
      </div>
      <div class="metric-card">
        <span>Today total</span>
        <strong id="today-total">-</strong>
      </div>
    </section>

    <section class="task-card">
      <div class="section-row">
        <span class="eyebrow">Task profile</span>
        <span class="status-pill" id="task-status">Off</span>
      </div>
      <select id="profile-select" aria-label="Task profile"></select>
      <div class="session-row">
        <span>Session</span>
        <strong id="session-duration">0m</strong>
      </div>
      <div class="button-row">
        <button class="primary" id="start-btn" type="button">Start</button>
        <button id="stop-btn" type="button">Stop</button>
      </div>
    </section>

    <section class="recommendation" id="recommendation"></section>
  </main>

  <footer>
    <button id="dashboard-btn" type="button">Dashboard</button>
    <button id="login-btn" type="button">Sign in</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
